name: Issue Orchestrator

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  # ── Job 1: Triage ────────────────────────────────────────────────────────────
  triage:
    runs-on: ubuntu-latest
    outputs:
      passed:       ${{ steps.triage.outputs.passed }}
      complexity:   ${{ steps.triage.outputs.complexity }}
      issue_number: ${{ steps.triage.outputs.issue_number }}
      issue_title:  ${{ steps.triage.outputs.issue_title }}
      issue_body:   ${{ steps.triage.outputs.issue_body }}

    steps:
      - name: Triage issue
        id: triage
        uses: actions/github-script@v7
        with:
          script: |
            const issue  = context.payload.issue;
            const title  = issue.title.toLowerCase();
            const body   = (issue.body || '').toLowerCase();
            const text   = title + ' ' + body;

            const PAGES    = ['homepage', 'about', 'products', 'index'];
            const ELEMENTS = ['headline', 'section', 'footer', 'link', 'text', 'hero', 'title'];
            const ACTIONS  = ['change', 'update', 'add', 'remove', 'edit'];

            const hasPage    = PAGES.some(p => text.includes(p));
            const hasElement = ELEMENTS.some(e => text.includes(e));
            const hasAction  = ACTIONS.some(a => text.includes(a));

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name, color, description
                });
              }
            };

            if (!hasPage || !hasElement || !hasAction) {
              await ensureLabel('needs-clarification', 'e4e669',
                'Issue needs more detail before it can be worked on');
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-clarification']
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '👋 **This ticket needs clarification.**',
                  '',
                  'Before it can be routed to a developer, please specify:',
                  '',
                  `- **Which page?** (e.g. homepage, about, products)  ${!hasPage ? '← missing' : '✅'}`,
                  `- **Which element?** (e.g. hero, headline, section, footer, link)  ${!hasElement ? '← missing' : '✅'}`,
                  `- **What change?** (e.g. update, add, remove, edit)  ${!hasAction ? '← missing' : '✅'}`,
                ].join('\n')
              });
              core.setOutput('passed', 'false');
              return;
            }

            const STRUCTURAL = [
              'add section', 'new section', 'create section',
              'add page',    'new page',    'create page'
            ];
            const complexity = STRUCTURAL.some(k => text.includes(k)) ? 'medium' : 'low';

            await ensureLabel('triaged',          '0075ca', 'Issue has been triaged and accepted');
            await ensureLabel('complexity:low',   'c2e0c6', 'Small, well-scoped text change');
            await ensureLabel('complexity:medium','f9d0c4', 'Structural or multi-element change');
            await ensureLabel('auto-generated',   'bfd4f2', 'Auto-generated PR from orchestrator');

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['triaged', `complexity:${complexity}`]
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                `✅ **Ticket accepted.** Complexity: \`${complexity}\`.`,
                '',
                'Routing to **Developer Agent** — a branch and draft PR will be created shortly.',
              ].join('\n')
            });

            core.setOutput('passed',       'true');
            core.setOutput('complexity',   complexity);
            core.setOutput('issue_number', String(issue.number));
            core.setOutput('issue_title',  issue.title);
            core.setOutput('issue_body',   issue.body || '');

  # ── Job 2: Developer Agent ────────────────────────────────────────────────────
  developer:
    needs: triage
    if: needs.triage.outputs.passed == 'true'
    runs-on: ubuntu-latest
    outputs:
      pr_number:   ${{ steps.create_pr.outputs.pr_number }}
      branch_name: ${{ steps.create_pr.outputs.branch_name }}

    steps:
      # ── Step 1: Create branch via API + classify change type ──────────────────
      - name: Create branch and classify change
        id: setup
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.triage.outputs.issue_number }}
          ISSUE_TITLE:  ${{ needs.triage.outputs.issue_title }}
          ISSUE_BODY:   ${{ needs.triage.outputs.issue_body }}
        with:
          script: |
            const issueNumber = process.env.ISSUE_NUMBER;
            const issueTitle  = process.env.ISSUE_TITLE;
            const issueBody   = process.env.ISSUE_BODY;
            const text        = `${issueTitle} ${issueBody}`.toLowerCase();
            const combined    = `${issueTitle} ${issueBody}`;
            const branchName  = `auto/ticket-${issueNumber}`;

            // ── Create branch off main ─────────────────────────────────────
            const { data: mainRef } = await github.rest.git.getRef({
              owner: context.repo.owner, repo: context.repo.repo,
              ref: 'heads/main'
            });
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: mainRef.object.sha
              });
              console.log(`Branch created: ${branchName}`);
            } catch (err) {
              if (err.status !== 422) throw err;
              console.log(`Branch ${branchName} already exists — continuing.`);
            }

            // ── Pattern detection (first match wins) ───────────────────────
            //   A  footer_link   : "footer" + ("link" OR "investor")
            //   B  hero_headline : ("hero" OR "h1") + ("headline" OR "title" OR "heading")
            //   C  add_section   : "add section" OR "new section" OR "create section"
            const isFooterLink   = text.includes('footer') &&
                                   (text.includes('link') || text.includes('investor'));
            const isHeroHeadline = (text.includes('hero') || text.includes('h1')) &&
                                   (text.includes('headline') || text.includes('title') || text.includes('heading'));
            const isAddSection   = /\b(add|new|create|insert)\s+section\b/.test(text);

            let changeType    = 'generic';
            let newHeadline   = '';
            let sectionTitle  = '';
            let targetPage    = 'index.html';

            if (isFooterLink) {
              // ── Pattern A ──────────────────────────────────────────────────
              changeType = 'footer_link';

            } else if (isHeroHeadline) {
              // ── Pattern B ──────────────────────────────────────────────────
              changeType   = 'hero_headline';
              // Prefer text in quotes; fall back to text after "to:" / "with:"; last resort: full title
              const quoted = combined.match(/[""']([^""'\n]{3,120})[""']/) ||
                             combined.match(/(?:to|with)\s*:\s*([A-Z][^\n]{3,120})/i);
              newHeadline  = quoted ? quoted[1].trim() : issueTitle;

            } else if (isAddSection) {
              // ── Pattern C ──────────────────────────────────────────────────
              changeType   = 'add_section';
              // Derive human-readable section title by stripping directive words
              sectionTitle = issueTitle
                .replace(/\b(add|create|new|insert)\s+(?:a\s+)?section\b/gi, '')
                .replace(/\b(?:on|to|in|for|the)\b/gi, '')
                .replace(/\s+/g, ' ').trim() || issueTitle;
              // Target page from keywords; default to homepage
              if      (text.includes('about'))    targetPage = 'about.html';
              else if (text.includes('products')) targetPage = 'products.html';
              else                                targetPage = 'index.html';
            }

            console.log(`change_type:   ${changeType}`);
            console.log(`target_page:   ${targetPage}`);
            if (newHeadline)  console.log(`new_headline:  ${newHeadline}`);
            if (sectionTitle) console.log(`section_title: ${sectionTitle}`);

            core.setOutput('branch_name',   branchName);
            core.setOutput('change_type',   changeType);
            core.setOutput('new_headline',  newHeadline);
            core.setOutput('section_title', sectionTitle);
            core.setOutput('target_page',   targetPage);

      # ── Step 2: Checkout the new branch ───────────────────────────────────────
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.setup.outputs.branch_name }}

      # ── Step 3A: Pattern A — insert Investor Relations link before </footer> ──
      - name: "Pattern A: Apply footer link"
        if: steps.setup.outputs.change_type == 'footer_link'
        run: |
          python3 << 'PYEOF'
          import sys

          LINK  = '<a href="/investors">Investor Relations</a>'
          FILES = ['index.html', 'about.html', 'products.html']

          for path in FILES:
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      src = f.read()
              except FileNotFoundError:
                  print(f'  {path} not found — skipping', file=sys.stderr)
                  continue

              if '</footer>' not in src:
                  print(f'  No </footer> in {path} — skipping', file=sys.stderr)
                  continue
              if LINK in src:
                  print(f'  Link already present in {path} — skipping')
                  continue

              src = src.replace('</footer>', f'  {LINK}\n</footer>', 1)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(src)
              print(f'  Updated {path}')
          PYEOF

      # ── Step 3B: Pattern B — replace first <h1> text in index.html ────────────
      - name: "Pattern B: Apply hero headline"
        if: steps.setup.outputs.change_type == 'hero_headline'
        env:
          NEW_HEADLINE: ${{ steps.setup.outputs.new_headline }}
        run: |
          python3 << 'PYEOF'
          import re, os, sys

          new_headline = os.environ['NEW_HEADLINE'].strip()
          path         = 'index.html'

          try:
              with open(path, 'r', encoding='utf-8') as f:
                  src = f.read()
          except FileNotFoundError:
              print(f'{path} not found', file=sys.stderr)
              sys.exit(1)

          # Replace text content of the first <h1> — DOTALL handles multi-line tags
          updated, n = re.subn(
              r'(<h1(?:\s[^>]*)?>).*?(</h1>)',
              rf'\g<1>{new_headline}\2',
              src, count=1, flags=re.DOTALL | re.IGNORECASE
          )
          if n == 0:
              print('No <h1> found in index.html — no changes made', file=sys.stderr)
              sys.exit(0)

          with open(path, 'w', encoding='utf-8') as f:
              f.write(updated)
          print(f'Updated <h1> in {path} → "{new_headline}"')
          PYEOF

      # ── Step 3C: Pattern C — insert new <section> before </main> or </body> ───
      - name: "Pattern C: Add new section"
        if: steps.setup.outputs.change_type == 'add_section'
        env:
          TARGET_PAGE:   ${{ steps.setup.outputs.target_page }}
          SECTION_TITLE: ${{ steps.setup.outputs.section_title }}
          ISSUE_BODY:    ${{ needs.triage.outputs.issue_body }}
        run: |
          python3 << 'PYEOF'
          import os, sys, textwrap

          target_page   = os.environ['TARGET_PAGE']
          section_title = os.environ['SECTION_TITLE'].strip()
          issue_body    = os.environ.get('ISSUE_BODY', '').strip()

          # Build a tidy section block (2-space indent to match existing HTML style)
          section_html = textwrap.dedent(f"""\

          <section class="auto-section">
            <div class="container">
              <h2>{section_title}</h2>
              <p>{issue_body or 'Content to be added here.'}</p>
            </div>
          </section>
          """)

          try:
              with open(target_page, 'r', encoding='utf-8') as f:
                  src = f.read()
          except FileNotFoundError:
              print(f'{target_page} not found', file=sys.stderr)
              sys.exit(1)

          # Insert before </main> first; fall back to </body>
          inserted = False
          for anchor in ['</main>', '</body>']:
              if anchor in src:
                  src = src.replace(anchor, section_html + anchor, 1)
                  inserted = True
                  print(f'Inserted <section> before {anchor} in {target_page}')
                  break

          if not inserted:
              print(f'Could not find </main> or </body> in {target_page}', file=sys.stderr)
              sys.exit(0)

          with open(target_page, 'w', encoding='utf-8') as f:
              f.write(src)
          PYEOF

      # ── Step 4: Commit + push ──────────────────────────────────────────────────
      - name: Commit and push changes
        env:
          BRANCH_NAME:  ${{ steps.setup.outputs.branch_name }}
          ISSUE_TITLE:  ${{ needs.triage.outputs.issue_title }}
          CHANGE_TYPE:  ${{ steps.setup.outputs.change_type }}
        run: |
          git config user.name  "Greif Orchestrator"
          git config user.email "orchestrator@github-actions.local"
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing changed — working tree is clean."
          else
            git commit -m "Auto: ${ISSUE_TITLE}"
            git push origin "${BRANCH_NAME}"
            echo "Pushed changes to ${BRANCH_NAME}"
          fi

      # ── Step 5: Open draft PR (idempotent — looks up existing PR on 422) ──────
      - name: Open PR
        id: create_pr
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER:  ${{ needs.triage.outputs.issue_number }}
          ISSUE_TITLE:   ${{ needs.triage.outputs.issue_title }}
          ISSUE_BODY:    ${{ needs.triage.outputs.issue_body }}
          COMPLEXITY:    ${{ needs.triage.outputs.complexity }}
          BRANCH_NAME:   ${{ steps.setup.outputs.branch_name }}
          CHANGE_TYPE:   ${{ steps.setup.outputs.change_type }}
          NEW_HEADLINE:  ${{ steps.setup.outputs.new_headline }}
          SECTION_TITLE: ${{ steps.setup.outputs.section_title }}
          TARGET_PAGE:   ${{ steps.setup.outputs.target_page }}
        with:
          script: |
            const issueNumber  = process.env.ISSUE_NUMBER;
            const issueTitle   = process.env.ISSUE_TITLE;
            const issueBody    = process.env.ISSUE_BODY;
            const complexity   = process.env.COMPLEXITY;
            const branchName   = process.env.BRANCH_NAME;
            const changeType   = process.env.CHANGE_TYPE;
            const newHeadline  = process.env.NEW_HEADLINE;
            const sectionTitle = process.env.SECTION_TITLE;
            const targetPage   = process.env.TARGET_PAGE;

            const changeDesc = {
              footer_link:
                'Inserted `<a href="/investors">Investor Relations</a>` immediately before ' +
                '`</footer>` in **`index.html`**, **`about.html`**, and **`products.html`**.',
              hero_headline:
                `Replaced the first \`<h1>\` text in **\`index.html\`** with:\n> "${newHeadline}"`,
              add_section:
                `Inserted a new \`<section class="auto-section">\` block before \`</main>\` ` +
                `in **\`${targetPage}\`** with heading: **"${sectionTitle}"**`,
              generic:
                '_No pattern matched — branch and PR created for manual implementation._',
            }[changeType] || '';

            const prBody = [
              `Closes #${issueNumber}`,
              '',
              '> Auto-generated by the **Issue Orchestrator** workflow.',
              '',
              `**Complexity:** \`${complexity}\`   **Change type:** \`${changeType}\``,
              '',
              '## What changed',
              '',
              changeDesc,
              '',
              '## Original issue',
              '',
              issueBody || '_No description provided._',
            ].join('\n');

            let prNumber, prUrl;

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Auto: ${issueTitle}`,
                body:  prBody,
                head:  branchName,
                base:  'main',
                draft: true
              });
              prNumber = pr.number;
              prUrl    = pr.html_url;

              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['auto-generated', `complexity:${complexity}`]
              });
              console.log(`PR created: ${prUrl}`);
            } catch (err) {
              if (err.status === 422) {
                // PR already exists for this branch — look it up
                const { data: prs } = await github.rest.pulls.list({
                  owner: context.repo.owner, repo: context.repo.repo,
                  head: `${context.repo.owner}:${branchName}`,
                  base: 'main', state: 'open'
                });
                if (prs.length) {
                  prNumber = prs[0].number;
                  prUrl    = prs[0].html_url;
                  console.log(`Using existing PR: ${prUrl}`);
                }
              } else {
                throw err;
              }
            }

            if (prUrl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: Number(issueNumber),
                body: `🤖 **Developer Agent** opened a draft PR: ${prUrl}`
              });
            }

            core.setOutput('pr_number',   String(prNumber ?? ''));
            core.setOutput('branch_name', branchName);

  # ── Job 3: Tester ────────────────────────────────────────────────────────────
  tester:
    needs: developer
    if: needs.developer.result == 'success' && needs.developer.outputs.pr_number != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.developer.outputs.branch_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies and Playwright browsers
        run: npm install && npx playwright install --with-deps chromium

      - name: Resolve Vercel preview URL
        id: preview
        uses: actions/github-script@v7
        env:
          PR_NUMBER:   ${{ needs.developer.outputs.pr_number }}
          BRANCH_NAME: ${{ needs.developer.outputs.branch_name }}
        with:
          script: |
            const prNumber   = Number(process.env.PR_NUMBER);
            const branchName = process.env.BRANCH_NAME;
            let previewUrl   = null;

            // Poll up to 3 minutes (18 × 10 s) for the Vercel deployment
            const MAX = 18;
            for (let i = 0; i < MAX; i++) {
              // 1. GitHub Deployments API (Vercel registers here)
              const { data: deps } = await github.rest.repos.listDeployments({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: branchName, environment: 'Preview', per_page: 5
              });
              for (const dep of deps) {
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner, repo: context.repo.repo,
                  deployment_id: dep.id, per_page: 1
                });
                if (statuses[0]?.state === 'success' && statuses[0]?.environment_url) {
                  previewUrl = statuses[0].environment_url;
                  break;
                }
              }
              if (previewUrl) break;

              // 2. Vercel bot PR comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber, per_page: 50
              });
              for (const c of comments) {
                if (c.user.type === 'Bot') {
                  const m = (c.body || '').match(/https:\/\/\S+\.vercel\.app/);
                  if (m) { previewUrl = m[0]; break; }
                }
              }
              if (previewUrl) break;

              if (i < MAX - 1) {
                console.log(`[${i + 1}/${MAX}] Waiting for Vercel preview...`);
                await new Promise(r => setTimeout(r, 10000));
              }
            }

            if (!previewUrl) {
              console.log('No preview deployment found — falling back to production URL.');
              previewUrl = 'https://greif-agentic-demo.vercel.app';
            }

            console.log(`Testing against: ${previewUrl}`);
            core.setOutput('url', previewUrl);

      - name: Run Playwright tests
        id: run_tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}
        run: |
          set +e
          npx playwright test --reporter=json > playwright-results.json 2>/dev/null
          echo "playwright_exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-pr-${{ needs.developer.outputs.pr_number }}
          path: playwright-results.json
          if-no-files-found: ignore

      - name: Post results and label PR
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER:       ${{ needs.developer.outputs.pr_number }}
          PREVIEW_URL:     ${{ steps.preview.outputs.url }}
          PLAYWRIGHT_EXIT: ${{ steps.run_tests.outputs.playwright_exit }}
        with:
          script: |
            const fs          = require('fs');
            const prNumber    = Number(process.env.PR_NUMBER);
            const previewUrl  = process.env.PREVIEW_URL;
            const exitCode    = process.env.PLAYWRIGHT_EXIT;
            const allPassed   = exitCode === '0';

            let stats    = { expected: 0, unexpected: 0, skipped: 0, flaky: 0 };
            let testRows = [];

            try {
              const raw     = fs.readFileSync('playwright-results.json', 'utf8');
              const results = JSON.parse(raw);
              stats = results.stats || stats;

              const flattenSpecs = (suites, fileTitle) => {
                for (const suite of (suites || [])) {
                  const title = suite.title || fileTitle || '';
                  for (const spec of (suite.specs || [])) {
                    const icon = spec.ok ? '✅' : '❌';
                    testRows.push(`| ${icon} | \`${title}\` | ${spec.title} |`);
                  }
                  flattenSpecs(suite.suites, title);
                }
              };
              flattenSpecs(results.suites);
            } catch (e) {
              testRows.push('| ⚠️ | — | Could not parse test results |');
            }

            const header = allPassed
              ? '### ✅ Playwright Tests — All Passed'
              : '### ❌ Playwright Tests — Failures Detected';

            const commentBody = [
              header,
              '',
              `**Preview URL:** ${previewUrl}`,
              `**Results:** \`${stats.expected ?? 0}\` passed · \`${stats.unexpected ?? 0}\` failed · \`${stats.skipped ?? 0}\` skipped`,
              '',
              testRows.length
                ? ['| Status | File | Test |', '|--------|------|------|', ...testRows].join('\n')
                : '_No test output available._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber, body: commentBody
            });

            const ensureLabel = async (name, color, desc) => {
              try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name }); }
              catch { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color, description: desc }); }
            };
            await ensureLabel('tests-passed',  '0e8a16', 'All Playwright E2E tests passed');
            await ensureLabel('tests-failing', 'd93f0b', 'One or more E2E tests failed');

            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber,
              labels: [allPassed ? 'tests-passed' : 'tests-failing']
            });

  # ── Job 4: Governance ────────────────────────────────────────────────────────
  governance:
    needs: [tester, developer]
    # Run even if tester fails; skip only if developer never produced a PR
    if: always() && needs.developer.result == 'success' && needs.developer.outputs.pr_number != ''
    runs-on: ubuntu-latest

    steps:
      - name: Scan PR diff for forbidden content
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.developer.outputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);

            // ── Forbidden content rules ────────────────────────────────────
            const RULES = [
              {
                pattern: /guaranteed\s+100%\s+recyclable/gi,
                tag:     'UNVERIFIABLE_CLAIM',
                detail:  '"guaranteed 100% recyclable" — unverifiable environmental claim'
              },
              {
                pattern: /best\s+in\s+the\s+world/gi,
                tag:     'UNSUBSTANTIATED_CLAIM',
                detail:  '"best in the world" — unsubstantiated superlative'
              },
              {
                // Known industrial packaging competitors
                pattern: /\b(mauser|schutz|berry\s+global|bway|sotralentz|rexnord\s+packaging|greif\s+rival)\b/gi,
                tag:     'COMPETITOR_REFERENCE',
                detail:  'Competitor name referenced in content'
              },
            ];

            // ── Fetch changed files ────────────────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: prNumber, per_page: 100
            });

            const flags = [];

            for (const file of files) {
              // Only scan lines that were added (lines beginning with "+")
              const addedLines = (file.patch || '')
                .split('\n')
                .filter(l => l.startsWith('+') && !l.startsWith('+++'))
                .join('\n');

              for (const rule of RULES) {
                if (rule.pattern.test(addedLines)) {
                  flags.push({ file: file.filename, ...rule });
                }
              }
            }

            // ── Ensure labels exist ────────────────────────────────────────
            const ensureLabel = async (name, color, desc) => {
              try { await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name }); }
              catch { await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name, color, description: desc }); }
            };
            await ensureLabel('governance-passed', '0e8a16', 'Content governance check passed');
            await ensureLabel('governance-block',  'b60205', 'PR blocked: content governance violation');

            // ── Build comment + apply label ────────────────────────────────
            let commentBody;

            if (flags.length === 0) {
              commentBody = [
                '### ✅ Governance Check — Approved',
                '',
                'No forbidden content detected in this PR\'s diff.',
                '',
                '_Scanned for: unverifiable claims · unsubstantiated superlatives · competitor name references._',
              ].join('\n');

              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber, labels: ['governance-passed']
              });
            } else {
              const flagList = flags.map(f =>
                `| \`${f.tag}\` | \`${f.file}\` | ${f.detail} |`
              ).join('\n');

              commentBody = [
                '### 🚫 Governance Check — Blocked',
                '',
                'The following issues were found in the PR diff:',
                '',
                '| Flag | File | Reason |',
                '|------|------|--------|',
                flagList,
                '',
                '**This PR cannot be merged until the flagged content is revised.**  ',
                'Remove or reword the flagged text, push a new commit, and the check will re-run automatically.',
              ].join('\n');

              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: prNumber, labels: ['governance-block']
              });

              core.setFailed(`Governance check failed: ${flags.length} violation(s) found.`);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: prNumber, body: commentBody
            });
