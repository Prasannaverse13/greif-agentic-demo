name: Staging to Production

on:
  workflow_dispatch:
    inputs:
      verified:
        description: 'I have verified staging'
        required: true
        type: boolean
        default: false

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    if: github.event.inputs.verified == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Smoke tests against staging
        run: npx playwright test tests/smoke.spec.ts
        env:
          BASE_URL: https://greif-agentic-demo.vercel.app/
      - name: Block production if smoke fails
        if: failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "❌ Smoke tests failed. Production promotion blocked."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  promote:
    needs: smoke-tests
    runs-on: ubuntu-latest
    steps:
      - name: Promote to production
        run: echo "Promoting to production..."
        